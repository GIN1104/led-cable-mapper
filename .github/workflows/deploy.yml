name: Deploy GitHub Pages

on:
  push:
    branches: [main, test]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main (production)
        uses: actions/checkout@v4
        with:
          ref: main
          path: main

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: main/package-lock.json

      - name: Install (main)
        working-directory: main
        run: npm ci

      - name: Build production → /
        working-directory: main
        run: npm run build

      - name: Assemble site root
        run: |
          mkdir -p site
          cp -a main/dist/. site/

      - name: Checkout test branch
        id: test_checkout
        continue-on-error: true
        uses: actions/checkout@v4
        with:
          ref: test
          path: test

      - name: Install (test)
        if: steps.test_checkout.outcome == 'success'
        working-directory: test
        run: npm ci

      - name: Build test → /test/
        if: steps.test_checkout.outcome == 'success'
        working-directory: test
        run: npm run build:test

      - name: Assemble site /test
        if: steps.test_checkout.outcome == 'success'
        run: |
          mkdir -p site/test
          cp -a test/dist/. site/test/

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
