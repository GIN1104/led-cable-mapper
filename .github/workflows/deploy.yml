name: Deploy GitHub Pages

on:
  push:
    branches: [main, test]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write
  actions: read

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout triggering branch
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Снимок прошлого деплоя — чтобы push в test не затирал prod и наоборот
      - name: Restore previous site snapshot
        id: restore
        continue-on-error: true
        uses: dawidd6/action-download-artifact@v6
        with:
          workflow: deploy.yml
          name: site-snapshot
          workflow_conclusion: success
          path: site
          search_artifacts: true
          if_no_artifact_found: warn

      - name: Ensure site dir
        id: unpack
        run: |
          mkdir -p site
          if [ -f site/index.html ] || [ -d site/assets ]; then
            echo "restored=true" >> "$GITHUB_OUTPUT"
            echo "Restored previous site snapshot"
          else
            echo "restored=false" >> "$GITHUB_OUTPUT"
            echo "No previous snapshot"
          fi

      # —— test: пересобираем только /test/ ——
      - name: Build test → /test/
        if: github.ref == 'refs/heads/test'
        run: npm run build:test

      - name: Assemble /test only
        if: github.ref == 'refs/heads/test'
        run: |
          rm -rf site/test
          mkdir -p site/test
          cp -a dist/. site/test/

      - name: Fallback build production (нет снимка)
        if: github.ref == 'refs/heads/test' && steps.unpack.outputs.restored != 'true'
        run: |
          git fetch origin main
          git worktree add ../main-src origin/main
          cd ../main-src
          npm ci
          npm run build
          cp -a dist/. "$GITHUB_WORKSPACE/site/"

      # —— main (merge): пересобираем только прод, /test не трогаем ——
      - name: Build production → /
        if: github.ref == 'refs/heads/main'
        run: npm run build

      - name: Assemble production root (сохраняя /test)
        if: github.ref == 'refs/heads/main'
        run: |
          mkdir -p site/test
          shopt -s dotglob nullglob
          for item in dist/*; do
            name=$(basename "$item")
            [ "$name" = "test" ] && continue
            rm -rf "site/$name"
            cp -a "$item" "site/$name"
          done

      - name: Save site snapshot
        uses: actions/upload-artifact@v4
        with:
          name: site-snapshot
          path: site
          include-hidden-files: true

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
